<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Pseudo-Class Example</title>

<style>
body{
    font-family: Arial, sans-serif;
    background-color: #f8f8f8;
    margin: 30px;
}

/* Hover Link */
a{
    color: #0000FF;
    font-size: 20px;
    text-decoration: none;
    font-weight: bold;
}

a:hover{
    color: #FF0000;
    background-color: #FFFF00;
    text-decoration: underline;
}

/* Focus Input */
.input{
    padding: 10px;
    width: 250px;
    border: 2px solid #555;
    border-radius: 5px;
    font-size: 16px;
}

input:focus{
    border: 3px solid #FF0000;
    background-color: #FFFF99;
    outline: none;
}

/* Hover Button */
.button{
    background-color: #008000;
    color: white;
    padding: 10px 20px;
    font-size: 16px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover{
    background-color: #FF4500;
    color: yellow;
}

/* Zebra Table */
table{
    width: 60%;
    border-collapse: collapse;
    margin-top: 20px;
}

th, td{
    border: 2px solid black;
    padding: 10px;
    text-align: center;
}

th{
    background-color: #000080;
    color: white;
}

/* Zebra Effect */
tr:nth-child(even){
    background-color: #ADD8E6;
}

tr:nth-child(odd){
    background-color: #FFFACD;
}

/* Hover Row */
tr:hover{
    background-color: #FF69B4;
    color: white;
}
</style>

</head>
<body>

<h2>CSS Pseudo-Class Examples</h2>

<p><a href="#">Hover over this link</a></p>

<p><input type="text" placeholder="Click here to focus"></p>

<p><button>Hover Me</button></p>

<table>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Course</th>
    </tr>
    <tr>
        <td>1</td>
        <td>Alice</td>
        <td>HTML</td>
    </tr>
    <tr>
        <td>2</td>
        <td>Bob</td>
        <td>CSS</td>
    </tr>
    <tr>
        <td>3</td>
        <td>Charlie</td>
        <td>JavaScript</td>
    </tr>
    <tr>
        <td>4</td>
        <td>David</td>
        <td>Python</td>
    </tr>
</table>

</body>
</html>
